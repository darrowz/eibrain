system:
  project_name: eibrain
  environment: development

deployment:
  root_dir: /home/${USER}/eibrain
  body_runtime_dir: ""
  cognitive_runtime_dir: ""
  allow_override: true

body:
  node_id: honjia
  foundation:
    ear: camera_mic
    eye: camera
    mouth: speaker
    neck: gimbal
  organs:
    ear:
      enabled: true
      capture:
        driver:
          kind: noop
      vad:
        driver:
          kind: noop
      asr:
        driver:
          kind: noop
          provider: sherpa_onnx
          mode: streaming
          model_dir: /home/${USER}/eibrain/models/asr/sherpa-onnx-streaming
    eye:
      enabled: true
      camera:
        driver:
          kind: noop
          device: /dev/video0
      detection:
        driver:
          kind: noop
          provider: hailo8
          device: /dev/hailo0
      identity:
        driver:
          kind: noop
    mouth:
      enabled: true
      tts_plan:
        driver:
          kind: noop
      tts_playback:
        driver:
          kind: noop
          backend: minimax
          output_device: default
    neck:
      enabled: true
      motor:
        driver:
          kind: noop
      tracking:
        driver:
          kind: noop

cognition:
  node_id: honxin
  llm:
    provider: anthropic_compatible
    model: ${ANTHROPIC_MODEL:-MiniMax-M2.7-highspeed}
    endpoint: ${ANTHROPIC_BASE_URL:-https://api.minimaxi.com/anthropic}
    api_key: ${ANTHROPIC_AUTH_TOKEN}
    temperature: 0.2
    supports_vision: false
    experimental: false
  vision_llm:
    provider: anthropic_compatible
    model: ${ANTHROPIC_VISION_MODEL:-coding-plan-vlm}
    endpoint: ${ANTHROPIC_BASE_URL:-https://api.minimaxi.com/anthropic}
    api_key: ${ANTHROPIC_AUTH_TOKEN}
    temperature: 0.2
    supports_vision: true
    experimental: true

vision:
  provider: minimax_cli
  cli:
    enabled: true
    command: ${MINIMAX_CLI_COMMAND:-mmx}
    api_key: ${MINIMAX_API_KEY:-}
    base_url: ${MINIMAX_API_HOST:-https://api.minimaxi.com}
  mcp:
    enabled: false
    command:
      - uvx
      - minimax-coding-plan-mcp
      - -y
    api_key: ${MINIMAX_API_KEY:-}
    api_host: ${MINIMAX_API_HOST:-https://api.minimaxi.com}
    base_path: ${MINIMAX_MCP_BASE_PATH:-}
    resource_mode: ${MINIMAX_API_RESOURCE_MODE:-url}

monitoring:
  enabled: true
  host: 0.0.0.0
  port: 18080

memory:
  openclaw:
    provider: eimemory_rpc
    endpoint: ${EIMEMORY_ENDPOINT:-http://127.0.0.1:8091/}
    api_key: ${OPENCLAW_API_KEY}
    timeout_s: 3.0
    agent_id: honxin
    workspace_id: honjia

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">eibrain cognitive and body split</title>
  <desc id="desc">Diagram showing eibrain as the cognitive coordinator between OpenClaw, eimemory, eiskills, eiprotocol, and eihead.</desc>
  <rect width="960" height="520" fill="#f8fafc"/>
  <style>
    .box{fill:#ffffff;stroke:#334155;stroke-width:2;rx:12}
    .main{fill:#eef6ff;stroke:#1d4ed8;stroke-width:3;rx:14}
    .text{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}
    .title{font-size:22px;font-weight:700}
    .label{font-size:16px;font-weight:700}
    .small{font-size:13px}
    .arrow{stroke:#475569;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
  </defs>
  <text class="text title" x="40" y="48">eibrain: cognitive coordinator</text>
  <rect class="main" x="330" y="185" width="300" height="150"/>
  <text class="text label" x="425" y="245">eibrain</text>
  <text class="text small" x="385" y="275">plan, orient, interrupt, reply</text>
  <text class="text small" x="380" y="298">keep cognition separate from IO</text>
  <rect class="box" x="60" y="90" width="230" height="105"/>
  <text class="text label" x="122" y="132">OpenClaw</text>
  <text class="text small" x="92" y="158">operator intent + policies</text>
  <rect class="box" x="60" y="295" width="230" height="105"/>
  <text class="text label" x="120" y="337">eimemory</text>
  <text class="text small" x="92" y="363">recall + learning evidence</text>
  <rect class="box" x="700" y="90" width="230" height="105"/>
  <text class="text label" x="765" y="132">eiskills</text>
  <text class="text small" x="730" y="158">skill routes + gates</text>
  <rect class="box" x="700" y="295" width="230" height="105"/>
  <text class="text label" x="778" y="337">eihead</text>
  <text class="text small" x="724" y="363">eye, ear, mouth, neck runtime</text>
  <rect class="box" x="345" y="405" width="270" height="70"/>
  <text class="text label" x="415" y="435">eiprotocol</text>
  <text class="text small" x="385" y="458">typed event contracts</text>
  <path class="arrow" d="M290 142 C330 142 330 205 360 220"/>
  <path class="arrow" d="M290 348 C330 348 330 310 360 300"/>
  <path class="arrow" d="M630 220 C665 205 665 142 700 142"/>
  <path class="arrow" d="M630 300 C665 310 665 348 700 348"/>
  <path class="arrow" d="M480 335 L480 405"/>
</svg>
